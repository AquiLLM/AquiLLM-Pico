<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquillm - Pico</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
<script>
  // Fallback: if jsdelivr failed, try cdnjs
  if (typeof katex === 'undefined') {
    document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.21/katex.min.js"><\/script>');
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.21/katex.min.css';
    document.head.appendChild(link);
  }
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface-hover: #1c1f25;
    --border: #25282f;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #22d3ee;
    --accent-dim: rgba(34, 211, 238, 0.08);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 10px; }

  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent); }
    50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
  }

  .logo-text { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }
  .logo-text span { color: var(--text-dim); font-weight: 400; }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .memory-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--accent); background: var(--accent-dim);
    border: 1px solid rgba(34, 211, 238, 0.15);
    padding: 3px 8px; border-radius: 6px;
    display: none; align-items: center; gap: 5px;
    cursor: default; transition: opacity 0.3s;
  }
  .memory-badge.visible { display: flex; }
  .memory-badge .mem-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
  }

  .status {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--text-dim); display: flex; align-items: center; gap: 6px;
  }

  .status-indicator {
    width: 6px; height: 6px; border-radius: 50%;
    background: #ef4444; transition: background 0.3s;
  }
  .status-indicator.connected { background: #22c55e; }

  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .message {
    max-width: 720px; width: 100%; margin: 0 auto; padding: 12px 0;
    animation: msg-in 0.25s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-role {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .message-role.user-role { color: var(--accent); }

  /* --- Markdown rendered content --- */
  .message-content {
    font-size: 15px; line-height: 1.65; color: var(--text);
    word-wrap: break-word; overflow-wrap: break-word;
  }

  /* During streaming, show raw text */
  .message-content.raw-stream {
    white-space: pre-wrap;
  }

  .message-content p { margin: 0 0 10px; }
  .message-content p:last-child { margin-bottom: 0; }
  .message-content strong { font-weight: 600; color: #f4f4f5; }
  .message-content em { font-style: italic; }

  .message-content ul, .message-content ol { margin: 8px 0; padding-left: 24px; }
  .message-content li { margin: 4px 0; line-height: 1.6; }

  .message-content h1, .message-content h2, .message-content h3,
  .message-content h4, .message-content h5, .message-content h6 {
    margin: 16px 0 8px; font-weight: 600; color: #f4f4f5;
  }
  .message-content h1 { font-size: 1.3em; }
  .message-content h2 { font-size: 1.15em; }
  .message-content h3 { font-size: 1.05em; }

  .message-content code {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 2px 6px; border-radius: 4px;
  }

  .message-content pre {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; margin: 10px 0; overflow-x: auto;
  }

  .message-content pre code {
    background: none; border: none; padding: 0;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.5;
  }

  .message-content blockquote {
    border-left: 3px solid var(--accent); margin: 10px 0;
    padding: 4px 14px; color: var(--text-dim);
  }

  .message-content a { color: var(--accent); text-decoration: none; }
  .message-content a:hover { text-decoration: underline; }

  .message-content table { border-collapse: collapse; margin: 10px 0; font-size: 14px; width: 100%; }
  .message-content th, .message-content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .message-content th { background: var(--surface); font-weight: 600; }
  .message-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* KaTeX overrides for dark theme */
  .message-content .katex { color: var(--text); font-size: 1.05em; }
  .message-content .katex-display { margin: 12px 0; overflow-x: auto; }

  /* Highlight.js overrides to match dark UI */
  .message-content pre code.hljs {
    background: var(--surface);
    padding: 0;
  }

  /* User messages stay plain */
  .message-content.user-content { white-space: pre-wrap; }

  /* Streaming cursor */
  .streaming .message-content::after {
    content: '▊'; color: var(--accent);
    animation: blink 0.6s step-end infinite; margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Welcome */
  .welcome {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; gap: 12px; opacity: 0.7;
  }
  .welcome h2 { font-size: 18px; font-weight: 500; }
  .welcome p { font-size: 13px; color: var(--text-dim); max-width: 460px; line-height: 1.6; }
  .welcome code {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 6px; display: inline-block;
    margin-top: 4px; color: var(--accent); user-select: all;
  }

  /* Input */
  .input-wrap { padding: 16px 24px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .input-row { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; }

  #input {
    flex: 1; font-family: 'DM Sans', sans-serif; font-size: 15px;
    color: var(--text); background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 16px; resize: none; outline: none;
    min-height: 46px; max-height: 160px; line-height: 1.5;
    transition: border-color 0.2s;
  }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--text-dim); }

  #send {
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--bg); background: var(--accent); border: none;
    border-radius: var(--radius); padding: 12px 20px; cursor: pointer;
    white-space: nowrap; transition: opacity 0.2s, transform 0.1s; height: 46px;
  }
  #send:hover { opacity: 0.9; }
  #send:active { transform: scale(0.97); }
  #send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .input-hint {
    max-width: 720px; margin: 6px auto 0;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--text-dim); text-align: right; opacity: 0.6;
  }

  .error-banner {
    max-width: 720px; margin: 8px auto; padding: 10px 14px;
    background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: 8px; font-size: 13px; color: #fca5a5;
    animation: msg-in 0.25s ease-out;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-text">AquiLLM <span>- Pico</span></div>
  </div>
  <div class="header-right">
    <div class="memory-badge" id="memoryBadge" title="Rolling summary of earlier conversation is active">
      <div class="mem-dot"></div>
      <span>memory active</span>
    </div>
    <div class="status">
      <div class="status-indicator" id="statusDot"></div>
      <span id="statusText">checking…</span>
    </div>
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>AquiLLM - Pico</h2>
    <img src="assets/aquillm_logo.svg" alt="AquiLLM logo" class="welcome-logo">
    <p>Running locally via llama.cpp on your Mac.</p>
    <p style="margin-top: 8px; font-size: 12px;">Be sure to run: bash run_server.sh</p>
  </div>
</div>

<div class="input-wrap">
  <div class="input-row">
    <textarea id="input" placeholder="Ask anything…" rows="1"></textarea>
    <button id="send">Send</button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
const API = 'http://localhost:8080/v1/chat/completions';
const HEALTH = 'http://localhost:8080/health';

const SYSTEM_MSG = {
  role: 'system',
  content: 'You are a helpful assistant. /no_think'
};

// Configure marked with syntax highlighting via custom renderer
const renderer = new marked.Renderer();
renderer.code = function({ text, lang }) {
  let highlighted;
  if (lang && hljs.getLanguage(lang)) {
    try { highlighted = hljs.highlight(text, { language: lang }).value; } catch {}
  }
  if (!highlighted) {
    try { highlighted = hljs.highlightAuto(text).value; } catch {}
  }
  if (!highlighted) highlighted = text;
  const langClass = lang ? ` class="language-${lang}"` : '';
  return `<pre><code${langClass}>${highlighted}</code></pre>`;
};

marked.setOptions({ breaks: true, gfm: true, renderer });

let messages = [];
let isStreaming = false;
let controller = null;

// --- Rolling summary memory ---
let summaryMemory = null;   // compressed text of older conversation
let summarizedUpTo = 0;     // index into messages[] already covered by summary
let isSummarizing = false;  // prevent overlapping summary calls

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const welcomeEl = document.getElementById('welcome');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const memoryBadge = document.getElementById('memoryBadge');

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

sendBtn.addEventListener('click', send);

async function checkStatus() {
  try {
    const res = await fetch(HEALTH);
    if (res.ok) {
      const data = await res.json();
      statusDot.className = 'status-indicator connected';
      statusText.textContent = data.status === 'ok' ? 'server ready' : `status: ${data.status}`;
      return;
    }
  } catch {}
  statusDot.className = 'status-indicator';
  statusText.textContent = 'server not detected';
}

checkStatus();
setInterval(checkStatus, 5000);

// ============================================================
//  Token estimation & context budget
// ============================================================
const CTX_LIMIT = 4096;
const MAX_TOKENS = 1024;
const RESERVED = MAX_TOKENS + 50;//200;
const HISTORY_BUDGET = CTX_LIMIT - RESERVED;
const KEEP_RECENT_MIN = 4; // always keep at least this many recent messages verbatim

function estimateTokens(text) {
  return Math.ceil(text.length / 4);
}

// ============================================================
//  Summarization — compresses older messages into a rolling summary
// ============================================================
async function maybeCompressHistory() {
  if (isSummarizing) return;

  const totalTokens = messages.reduce((acc, m) => acc + estimateTokens(m.content), 0);
  const summaryTokens = summaryMemory ? estimateTokens(summaryMemory) : 0;

  // Only compress when we'd actually exceed the budget
  if (totalTokens + summaryTokens <= HISTORY_BUDGET) return;

  // Keep at least the last N messages verbatim
  const keepRecent = Math.min(messages.length, KEEP_RECENT_MIN);
  const toSummarize = messages.length - keepRecent;

  // Nothing new to compress beyond what's already summarized
  if (toSummarize <= summarizedUpTo) return;

  isSummarizing = true;

  const oldChunk = messages.slice(summarizedUpTo, toSummarize);
  if (oldChunk.length === 0) { isSummarizing = false; return; }

  // Build input: fold previous summary + new old messages together
  const contextToCompress = [
    ...(summaryMemory ? [`[Previous summary]: ${summaryMemory}`] : []),
    ...oldChunk.map(m => `${m.role}: ${m.content}`)
  ].join('\n');

  const summaryPrompt = [
    {
      role: 'system',
      content: 'Compress this conversation into a brief summary. Keep facts, names, decisions, code topics, and any user preferences. Be concise. Respond with only the summary, no preamble. /no_think'
    },
    { role: 'user', content: contextToCompress }
  ];

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: summaryPrompt,
        max_tokens: 200,
        temperature: 0.2
      })
    });
    const json = await res.json();
    let newSummary = json.choices?.[0]?.message?.content;
    if (newSummary) {
      // Strip any think tags the model might emit
      newSummary = stripThinkTags(newSummary) || newSummary;
      summaryMemory = newSummary.trim();
      summarizedUpTo = toSummarize;
      memoryBadge.classList.add('visible');
      console.log(`[memory] summarized ${oldChunk.length} messages → ${estimateTokens(summaryMemory)} tokens`);
    }
  } catch (e) {
    console.error('[memory] summarization failed:', e);
  } finally {
    isSummarizing = false;
  }
}

// ============================================================
//  Build the message array sent to the API
// ============================================================
function buildApiMessages() {
  // Recent messages = everything after what's been summarized
  const recent = messages.slice(summarizedUpTo);

  // Trim from the front if still over budget
  let trimmed = [];
  let tokens = 0;
  for (let i = recent.length - 1; i >= 0; i--) {
    const t = estimateTokens(recent[i].content);
    if (tokens + t > HISTORY_BUDGET && trimmed.length > 0) break;
    trimmed.unshift(recent[i]);
    tokens += t;
  }

  // Single system message — fold summary in if it exists
  const systemContent = summaryMemory
    ? `${SYSTEM_MSG.content}\n\n[Earlier conversation summary]:\n${summaryMemory}`
    : SYSTEM_MSG.content;

  return [{ role: 'system', content: systemContent }, ...trimmed];
}

// ============================================================
//  UI helpers
// ============================================================
function addMessage(role, content) {
  if (welcomeEl) welcomeEl.remove();
  const div = document.createElement('div');
  div.className = 'message';
  const roleClass = role === 'user' ? 'user-role' : '';
  div.innerHTML = `
    <div class="message-role ${roleClass}">${role}</div>
    <div class="message-content ${role === 'user' ? 'user-content' : ''}"></div>
  `;
  if (content) div.querySelector('.message-content').textContent = content;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function showError(text) {
  const div = document.createElement('div');
  div.className = 'error-banner';
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function stripThinkTags(raw) {
  const closeIdx = raw.indexOf('</think>');
  if (closeIdx !== -1) return raw.substring(closeIdx + 8).trim();
  if (raw.includes('<think>')) return '';
  return raw;
}

/**
 * Render markdown + LaTeX.
 * Replaces $$ ... $$ (display) and $ ... $ (inline) with KaTeX,
 * then renders the rest as markdown.
 */
function renderMarkdownWithMath(text) {
  // If KaTeX failed to load, just render markdown without math
  if (typeof katex === 'undefined') {
    console.warn('[katex] not loaded — math will render as raw text');
    return marked.parse(text);
  }

  // Protect code blocks from LaTeX processing
  const codeBlocks = [];
  let processed = text.replace(/```[\s\S]*?```/g, (match) => {
    codeBlocks.push(match);
    return `%%CODEBLOCK_${codeBlocks.length - 1}%%`;
  });
  const inlineCodes = [];
  processed = processed.replace(/`[^`]+`/g, (match) => {
    inlineCodes.push(match);
    return `%%INLINECODE_${inlineCodes.length - 1}%%`;
  });

  // Collect rendered KaTeX into placeholders so marked doesn't mangle the HTML
  const mathBlocks = [];
  function mathPlaceholder(html) {
    mathBlocks.push(html);
    return `%%MATH_${mathBlocks.length - 1}%%`;
  }

  // Display math: $$ ... $$  (must come before inline $ handling)
  processed = processed.replace(/\$\$([\s\S]*?)\$\$/g, (_, expr) => {
    try {
      return mathPlaceholder(katex.renderToString(expr.trim(), { displayMode: true, throwOnError: false }));
    } catch (e) { return `$$${expr}$$`; }
  });

  // Inline math: $ ... $
  processed = processed.replace(/(?<!\$)\$(?!\$)((?:[^$\n]|\\\$)+?)\$(?!\$)/g, (match, expr) => {
    const trimmed = expr.trim();
    if (!trimmed) return match;
    try {
      return mathPlaceholder(katex.renderToString(trimmed, { displayMode: false, throwOnError: false }));
    } catch (e) { return match; }
  });

  // Restore code blocks before markdown rendering
  processed = processed.replace(/%%CODEBLOCK_(\d+)%%/g, (_, i) => codeBlocks[i]);
  processed = processed.replace(/%%INLINECODE_(\d+)%%/g, (_, i) => inlineCodes[i]);

  // Render markdown
  let html = marked.parse(processed);

  // Restore KaTeX HTML after markdown rendering (so marked doesn't escape it)
  html = html.replace(/%%MATH_(\d+)%%/g, (_, i) => mathBlocks[i]);

  return html;
}

// ============================================================
//  Send message + stream response
// ============================================================
async function send() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  isStreaming = true;

  const assistantDiv = addMessage('assistant', '');
  assistantDiv.classList.add('streaming');
  const contentEl = assistantDiv.querySelector('.message-content');

  controller = new AbortController();
  let fullResponse = '';
  let lastRenderTime = 0;
  let renderPending = null;
  const RENDER_INTERVAL = 20;//30;

  // Only auto-scroll if user is near the bottom (hasn't scrolled up)
  function isNearBottom() {
    return chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 80;
  }

  // Live-render visible text as markdown (throttled)
  function liveRender(visible) {
    const shouldScroll = isNearBottom();
    contentEl.innerHTML = renderMarkdownWithMath(visible);
    if (shouldScroll) chatEl.scrollTop = chatEl.scrollHeight;
  }

  function scheduleRender(visible) {
    const now = Date.now();
    if (now - lastRenderTime >= RENDER_INTERVAL) {
      lastRenderTime = now;
      liveRender(visible);
    } else if (!renderPending) {
      renderPending = setTimeout(() => {
        renderPending = null;
        lastRenderTime = Date.now();
        const currentVisible = stripThinkTags(fullResponse);
        if (currentVisible) liveRender(currentVisible);
      }, RENDER_INTERVAL - (now - lastRenderTime));
    }
  }

  try {
    // Build context-managed message array
    const apiMessages = buildApiMessages();

    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: apiMessages,
        stream: true,
        max_tokens: MAX_TOKENS,
        temperature: 0.7
      }),
      signal: controller.signal
    });

    if (!res.ok) throw new Error(`server returned ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      let lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') break;

        try {
          const json = JSON.parse(payload);
          const token = json.choices?.[0]?.delta?.content;
          if (token) {
            fullResponse += token;
            const visible = stripThinkTags(fullResponse);
            if (visible) {
              scheduleRender(visible);
            } else {
              contentEl.textContent = 'Thinking…';
            }
          }
        } catch (e) {}
      }
    }

    // Cancel any pending throttled render
    if (renderPending) { clearTimeout(renderPending); renderPending = null; }

    // --- Final render: clean + complete ---
    const cleanResponse = stripThinkTags(fullResponse) || fullResponse;
    messages.push({ role: 'assistant', content: cleanResponse });

    contentEl.innerHTML = renderMarkdownWithMath(cleanResponse);
    chatEl.scrollTop = chatEl.scrollHeight;

  } catch (err) {
    if (err.name !== 'AbortError') {
      showError(
        err.message.includes('Failed to fetch')
          ? 'Cannot reach server. Make sure it\'s running on port 8080.'
          : `Error: ${err.message}`
      );
    }
  } finally {
    assistantDiv.classList.remove('streaming');
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();

    // Compress history in the background for the next turn
    maybeCompressHistory();
  }
}

inputEl.focus();
</script>
</body>
</html>
